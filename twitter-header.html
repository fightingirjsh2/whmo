<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1500px;
      height: 500px;
      overflow: hidden;
    }

    .header {
      width: 1500px;
      height: 500px;
      background: #1c1b19;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .header__title {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: 96px;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .w { color: #7c3aed; }
    .h { color: #1e6b3a; }
    .m { color: #c0392b; }
    .o { color: #0e7c86; }

    .header__url {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      font-size: 34px;
      letter-spacing: 0.04em;
      color: #f7f4ef;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header__title"><span class="w">Wait,</span> <span class="h">Hear</span> <span class="m">Me</span> <span class="o">Out…</span></div>
    <div class="header__url">waithearmeout.com</div>
  </div>
</body>
</html>
