<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #888;
    }

    .logo {
      width: 400px;
      height: 400px;
      background: #0f0e0c;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .logo__text {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: 130px;
      line-height: 0.95;
      letter-spacing: -0.04em;
      text-align: center;
      color: #f7f4ef;
    }

    .logo__text > span {
      display: block;
    }

    .w { color: #7c3aed; }
    .h { color: #1e6b3a; }
    .m { color: #c0392b; }
    .o { color: #0e7c86; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo__text">
      <span><span class="w">W</span><span class="h">H</span></span>
      <span><span class="m">M</span><span class="o">O</span></span>
    </div>
  </div>
</body>
</html>
